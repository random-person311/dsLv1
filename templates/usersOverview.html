{% extends "base.html" %}

{% include "navbar.html" %}
{% block title %}Dashboard - Users{% endblock %}

{% block content %}

<table class="table table-striped" style="border: 1px solid black; border-collapse: collapse;">
    <thead>
        <tr>
            <th style="border: 1px solid black; padding: 10px;">id</th>
            <th style="border: 1px solid black; padding: 10px;">username</th>
            <th style="border: 1px solid black; padding: 10px;">password</th>
            <th style="border: 1px solid black; padding: 10px;">role</th>
            <th style="border: 1px solid black; padding: 10px;">Edit</th>
            <th style="border: 1px solid black; padding: 10px;">Delete</th>
        </tr>
    </thead>
    <tbody>
        {% for item in data %}
        <tr>
            <td style="border: 1px solid black; padding: 10px;">{{item.id}}</td>
            <td style="border: 1px solid black; padding: 10px;">{{item.username}}</td>
            <td style="border: 1px solid black; padding: 10px;">{{item.password}}</td>
            <td style="border: 1px solid black; padding: 10px;">{{item.role}}</td>
            <td style="border: 1px solid black; padding: 10px;"><a href="/dashboard/users/edit/{{item.id}}">Edit</a></td>
            <td style="border: 1px solid black; padding: 10px;"><a href="/dashboard/users/delete/{{item.id}}">Delete</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
